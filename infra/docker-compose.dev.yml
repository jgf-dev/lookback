services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../backend:/app
      - ../shared:/shared
    command: sh -c "pip install -e .[dev] && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
