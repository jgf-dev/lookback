version: "3.9"

services:
  backend:
    build:
      context: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ../backend/.env.example
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    env_file:
      - ../frontend/.env.example
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lookback
      POSTGRES_PASSWORD: lookback
      POSTGRES_DB: lookback
    ports:
      - "5432:5432"

  queue:
    image: redis:7
    ports:
      - "6379:6379"
